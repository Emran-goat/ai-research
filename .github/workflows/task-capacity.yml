name: Task Capacity Manager

on:
  schedule:
    - cron: "0 2 * * *"   # 每天 UTC 02:00 在 auto-create-tasks 之前
  workflow_dispatch:

permissions:
  issues: write
  contents: read

jobs:
  check-capacity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const MAX_OPEN = 200;

            // Count open issues
            let openCount = 0;
            let page = 1;
            while (true) {
              const { data: issues } = await github.rest.issues.listForRepo({
                owner, repo, state: "open", per_page: 100, page: page
              });
              if (issues.length === 0) break;
              // Only count actual issues (not PRs)
              openCount += issues.filter(i => !i.pull_request).length;
              page++;
              if (page > 5) break; // safety cap at 500
            }

            console.log(`Open issues: ${openCount} (max: ${MAX_OPEN})`);

            if (openCount >= MAX_OPEN) {
              // Disable auto-create-tasks by creating a block comment on auto-create-tasks issue
              console.log(`CAPACITY REACHED: ${openCount} >= ${MAX_OPEN}. Pausing task creation.`);

              // Create a gauge issue
              const { data: existing } = await github.rest.issues.listForRepo({
                owner, repo, state: "open", labels: "capacity-gauge", per_page: 1
              });

              const percentage = Math.round((openCount / MAX_OPEN) * 100);
              let gauge = "🟩".repeat(Math.min(Math.floor(percentage / 10), 10));
              gauge += "🟥".repeat(Math.max(10 - Math.floor(percentage / 10), 0));

              const body = `## 📊 任务容量仪表盘\n\n**当前**: ${openCount} / ${MAX_OPEN} Open Issues\n**负载**: ${percentage}%\n\n${gauge}\n\n${
                openCount >= MAX_OPEN
                  ? "⛔ **任务创建已暂停** - 超过容量上限"
                  : `✅ 可创建 ${MAX_OPEN - openCount} 个新任务`
              }\n\n> 每天 UTC 02:00 自动更新`;

              if (existing.length > 0) {
                await github.rest.issues.update({
                  issue_number: existing[0].number, owner, repo, body
                });
              } else {
                await github.rest.issues.create({
                  owner, repo,
                  title: "📊 任务容量仪表盘",
                  body,
                  labels: ["capacity-gauge"]
                });
              }
            } else {
              console.log(`OK: ${openCount}/${MAX_OPEN} - capacity available`);
            }

            // Output for next workflow
            core.setOutput("can_create", (openCount < MAX_OPEN).toString());
            core.setOutput("open_count", openCount.toString());
