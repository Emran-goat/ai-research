name: Review Pending PRs

on:
  schedule:
    - cron: "0 */4 * * *"
  workflow_dispatch:

permissions:
  pull-requests: write
  issues: write
  contents: write

jobs:
  batch-review:
    if: github.repository_owner == github.actor
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const { data: prs } = await github.rest.pulls.list({
              owner, repo, state: "open", per_page: 100
            });
            let reviewed = 0;
            let skipped = 0;
            for (const pr of prs) {
              if (pr.user.login === owner) continue;
              const { data: labels } = await github.rest.issues.listLabelsOnIssue({
                issue_number: pr.number, owner, repo
              });
              const labelNames = labels.map(l => l.name);
              if (labelNames.includes("auto-reviewed") || labelNames.includes("cheat-detected")) {
                skipped++;
                continue;
              }
              const { data: files } = await github.rest.pulls.listFiles({
                owner, repo, pull_number: pr.number
              });
              let cheatScore = 0;
              let totalAdditions = 0;
              let totalDeletions = 0;
              for (const file of files) {
                totalAdditions += file.additions;
                totalDeletions += file.deletions;
                const patch = file.patch || "";
                if (file.deletions > 100 && file.additions < 20) cheatScore += 0.5;
                if (/shell\s*=\s*True/.test(patch)) cheatScore += 0.1;
                if (/eval\s*\(/.test(patch)) cheatScore += 0.1;
                if (/exec\s*\(/.test(patch)) cheatScore += 0.1;
              }
              if (cheatScore >= 0.5) {
                await github.rest.issues.addLabels({
                  issue_number: pr.number, owner, repo, labels: ["cheat-detected"]
                });
                console.log("PR #" + pr.number + ": cheat detected");
              } else if (totalAdditions > 0 && totalDeletions <= totalAdditions * 2) {
                await github.rest.issues.addLabels({
                  issue_number: pr.number, owner, repo, labels: ["auto-reviewed", "approved"]
                });
                reviewed++;
                console.log("PR #" + pr.number + ": approved");
              }
              await new Promise(r => setTimeout(r, 1000));
            }
            console.log("Done: " + reviewed + " reviewed, " + skipped + " skipped");
