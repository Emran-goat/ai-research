name: PR Auto-Label
on:
  pull_request:
    types: [opened, reopened, ready_for_review]
permissions:
  pull-requests: write
  issues: write
jobs:
  label-pr:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            if (!pr) { console.log("Not a PR event, skipping."); return; }
            
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const prNumber = pr.number;
            const author = (pr.user.login || "").toLowerCase();
            const title = (pr.title || "").toLowerCase();
            const body = (pr.body || "").toLowerCase();
            
            const newLabels = [];
            
            // ── Bot / Agent Detection ──
            const knownBots = {
              "genesisrevelationinc-debug": { label: "shanaboo-bot", desc: "ShanaBoo autonomous fix agent" },
              "taibaihu": { label: "crazy-monkey-bot", desc: "Crazy Monkey auto-patch agent" },
            };
            
            if (knownBots[author]) {
              newLabels.push(knownBots[author].label);
              newLabels.push("bot");
            } else if (title.includes("[shanaboo]") || body.includes("shanaboo")) {
              newLabels.push("shanaboo-bot");
              newLabels.push("bot");
            }
            
            // ── Vulnerability Type Detection from Title ──
            const vulnPatterns = [
              { label: "sql-injection", keywords: ["sql", "sqli"] },
              { label: "xss", keywords: ["xss", "cross-site scripting"] },
              { label: "csrf", keywords: ["csrf", "cross-site request forgery"] },
              { label: "ssrf", keywords: ["ssrf", "server-side request forgery"] },
              { label: "command-injection", keywords: ["command injection", "rce", "remote code", "code execution"] },
              { label: "path-traversal", keywords: ["path traversal", "directory traversal"] },
              { label: "xxe", keywords: ["xxe", "xml external entity"] },
              { label: "idor", keywords: ["idor", "insecure direct object"] },
              { label: "deserialization", keywords: ["deserialization", "pickle", "unsafe deserialization"] },
              { label: "jwt", keywords: ["jwt", "json web token"] },
              { label: "prototype-pollution", keywords: ["prototype pollution"] },
              { label: "race-condition", keywords: ["race condition", "race window"] },
              { label: "ssti", keywords: ["ssti", "template injection"] },
              { label: "hardcoded-secrets", keywords: ["hardcoded", "secret", "credential"] },
            ];
            
            for (const pattern of vulnPatterns) {
              if (pattern.keywords.some(k => title.includes(k) || body.includes(k))) {
                newLabels.push(pattern.label);
              }
            }
            
            // ── Bounty Detection ──
            const bountyMatch = title.match(/\$(\d+)/);
            if (bountyMatch) {
              newLabels.push("bounty");
              const amount = parseInt(bountyMatch[1]);
              if (amount <= 25) newLabels.push("difficulty: easy");
              else if (amount <= 50) newLabels.push("difficulty: medium");
              else if (amount <= 100) newLabels.push("difficulty: hard");
              else newLabels.push("difficulty: expert");
            }
            
            // ── Needs Review ──
            if (pr.draft === false) {
              newLabels.push("needs-review");
            }
            
            // ── Apply Labels ──
            if (newLabels.length > 0) {
              const { data: existing } = await github.rest.issues.listLabelsOnIssue({
                issue_number: prNumber, owner, repo
              });
              const existingNames = existing.map(l => l.name);
              const toAdd = newLabels.filter(l => !existingNames.includes(l));
              
              if (toAdd.length > 0) {
                await github.rest.issues.addLabels({
                  issue_number: prNumber, owner, repo,
                  labels: toAdd
                });
                console.log("Labeled PR #" + prNumber + ": " + toAdd.join(", "));
              } else {
                console.log("PR #" + prNumber + " already has all applicable labels");
              }
            }
            
            // ── Welcome First-Time Contributor ──
            if (pr.author_association === "FIRST_TIME_CONTRIBUTOR" || pr.author_association === "FIRST_CONTRIBUTOR") {
              console.log("Welcome first-time contributor @" + pr.user.login + "!"); 
            }

            console.log("Processed PR #" + prNumber + " from @" + pr.user.login);
